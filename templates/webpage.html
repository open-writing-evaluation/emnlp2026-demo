<!DOCTYPE html>
<html>
    <body>
        <div class="container">
            <div class="form_parent">
            <br>
            <p><label style="font-size: 28px;"> Write it right! </label></p>
            <p><label style="font-size: 18px;"> Type in the text box, then press submit to obtain grammar error correction annotations. </label></p>
            <div class="box">
                <textarea 
                    required type="text" 
                    id="text_area" 
                    name="textInput" 
                    placeholder="Type sentences here..." 
                    maxlength="2000"
                ></textarea>
            </div>

            <button type="submit" onclick="submit()">Submit</button>
            </div>
        </div>

        <div id="loadingOverlay" class="loading_overlay">
            <div class="loader"></div> 
        </div>

        <div class="out_container" id="out_container">
            <div class="form_parent">
                <div class="box_results">
                    <div id="add-sen-anno">{{content | safe}}</div>
                    <div id="add-sen-corr">{{content | safe}}</div>
                </div>

                <button type="submit" onclick="switchView()" id="view-button">Hide Annotations</button>
            </div>
        </div> 

        <style>
            body {
                background-color: rgb(255, 255, 255);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                filter: brightness(80%);
                margin: 0;
            }
            .box_results {
                padding: 10px;
                border: solid;
                border-color: slategrey;
                border-radius: 6px;
                border-width: 2px;
                max-height: 28vh;
                overflow: scroll;
            }
            .box {
                padding: 10px;
                border: solid;
                border-color: slategrey;
                border-radius: 6px;
                border-width: 2px;
            }
            .container {
                display: flex;
                align-items: center;
                margin-left: 5vw;
                margin-right: 5vw;
            }
            .out_container {
                display: flex;
                align-items: center;
                margin-top: 2vh;
                margin-left: 5vw;
                margin-right: 5vw;
                visibility: hidden;
            }
            .form_parent {
                width: 80%;
                line-height: 2em;
                margin-bottom: 20px;
            }
            label {
                font-size: 14px;
                font-weight: 600;
                margin-right: 5px;
                vertical-align: middle;
            }
            input {
                margin-right: 15px;
                vertical-align: middle;
            }
            select {
                margin-right: 15px;
                vertical-align: bottom;
                background-color: transparent;
                border: solid;
                border-color: slategrey;
                border-radius: 6px;
                border-width: 2px;
                font-size: 14px;
            }
            .options_container {
                padding-bottom: 4px;
                border-right: 1px solid slategrey;
                margin-right: 10px;
            }
            textarea {
                font-family: Tahoma, Helvetica, Arial, "Microsoft Yahei","微软雅黑", STXihei, "华文细黑", sans-serif;
                color: #000000;
                background-color: inherit;
                resize: vertical;
                border: none;
                outline: none;
                width: 99%;
                height: 30vh;
                max-height: 30vh;
                font-size: 16.5px;
                resize: none; 
            }
            button[type=submit] {
                margin-top: 2vh;
                background-color: transparent;
                border: solid;
                border-color: darkslategrey;
                border-radius: 6px;
                border-width: 2px;
                text-decoration: none;
                cursor: pointer;
                font-size: 16.5px;
                font-weight: 500;
                vertical-align: bottom;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            }
            hr {
                border: none;
                border-top: 1px dotted slategrey;
            }
            .page_divider {
                border: none;
                border-top: 1px solid slategrey;
            }
            .sentence {
                font-family: Tahoma, Helvetica, Arial, "Microsoft Yahei","微软雅黑", STXihei, "华文细黑", sans-serif;
                font-size: 1em;
            }
    
            .green_highlight {
                font-family: Tahoma, Helvetica, Arial, "Microsoft Yahei","微软雅黑", STXihei, "华文细黑", sans-serif;
                background-color: rgba(230, 255, 230, 1);
                color: #000000;
                border-radius: 5px;
                -webkit-box-decoration-break: clone;
                box-decoration-break: clone;
                padding: 2px 4.5px;
                border-style: solid;
                border-width: 2px;
                border-color: rgba(230, 255, 230, 1);
            }

            .red_highlight {
                opacity: 0.7;
                font-family: Tahoma, Helvetica, Arial, "Microsoft Yahei","微软雅黑", STXihei, "华文细黑", sans-serif;
                background-color: rgba(40, 0, 0, 1);
                color: #000000;
                border-radius: 5px;
                -webkit-box-decoration-break: clone;
                box-decoration-break: clone;
                padding: 2px 4.5px;
                border-style: solid;
                border-width: 2px;
                border-color: rgba(40, 0, 0, 1);
            }

            .darkgreen_highlight {
                font-family: Tahoma, Helvetica, Arial, "Microsoft Yahei","微软雅黑", STXihei, "华文细黑", sans-serif;
                background-color: #03a31ecc;
                color: #000000;
                border-radius: 5px;
                -webkit-box-decoration-break: clone;
                box-decoration-break: clone;
                padding: 2px 4.5px;
                border-style: solid;
                border-width: 2px;
                border-color: #000000;
            }

            .darkred_highlight {
                font-family: Tahoma, Helvetica, Arial, "Microsoft Yahei","微软雅黑", STXihei, "华文细黑", sans-serif;
                background-color: #b30202cc;
                color: #232323bf;
                border-radius: 5px;
                -webkit-box-decoration-break: clone;
                box-decoration-break: clone;
                padding: 2px 4.5px;
                border-style: solid;
                border-width: 2px;
                border-color: #000000;
            }

            .loading_overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0, 0, 0, 0.3);
                justify-content: center;
                align-items: center;
                color: #fff;
                font-size: 2rem;
                user-select: none;
            }

            .loader {
                border: 8px solid #f3f3f3;
                border-top: 8px solid #424242;
                border-radius: 50%;
                width: 5vh;
                height: 5vh;
                animation: spin 2s linear infinite;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>

        <script>
            const add_sen_anno = document.getElementById('add-sen-anno');
            const add_sen_corr = document.getElementById('add-sen-corr');

            // https://stackoverflow.com/questions/45069514/check-if-string-ends-with-any-of-multiple-characters
            function endsWithAny(suffixes, string) {
                return suffixes.some(function (suffix) {
                    return string.endsWith(suffix);
                });
            }

            function switchView() {
                let anno = document.getElementById('add-sen-anno');
                let corr = document.getElementById('add-sen-corr');
                let btn = document.getElementById('view-button')

                if (anno.style.display == 'none') {
                    anno.style.display = '';
                    corr.style.display = 'none';
                    btn.innerText = 'Hide Annotations';
                } else {
                    anno.style.display = 'none';
                    corr.style.display = '';
                    btn.innerText = 'Show Annotations';
                }
            }

            function showOutput() {
                const div = document.getElementById("out_container");
                div.style.visibility = "visible";         
            }

            function submit() {
                const loadingOverlay = document.getElementById('loadingOverlay');
                loadingOverlay.style.display = 'flex';

                fetch('/data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({input_data: text_area.value})
                })
                .then(response => response.json())
                .then(data => {
                    loadingOverlay.style.display = 'none';
                    add_sen_anno.innerHTML = `${data.anno}`;
                    add_sen_corr.innerHTML = `${data.corr}`;
                    add_sen_anno.style.display = '';
                    add_sen_corr.style.display = 'none';
                    showOutput();
                })
                .catch(error => {
                    loadingOverlay.style.display = 'none';
                    add_sen_anno.innerHTML = "<p>Processing Error. Try again later.</p>";
                    add_sen_corr.innerHTML = "<p>Processing Error. Try again later.</p>";
                    add_sen_corr.style.display = 'none';
                });
            }
        </script>
    </body>
</html>
